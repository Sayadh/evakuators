# Evakuators.am — example nginx configuration
#
#   evakuators.am      → Nuxt frontend  (PM2, port 3002)
#   api.evakuators.am  → NestJS backend (PM2, port 4002, routes under /api/v1)
#
# Never swap these two ports — 3002 is always the frontend, 4002 always the backend.
#
# TLS certificates: use certbot (Let's Encrypt):
#   certbot --nginx -d evakuators.am -d www.evakuators.am -d api.evakuators.am

# ── Frontend ──────────────────────────────────────────────
server {
    listen 80;
    server_name evakuators.am www.evakuators.am;

    # Redirect www → apex
    if ($host = www.evakuators.am) {
        return 301 https://evakuators.am$request_uri;
    }

    # Moderation panel — auth is handled by the app itself now (JWT login,
    # see backend/src/admin-auth). No nginx Basic Auth here on purpose: it
    # only ever gated the page shell, not the data, and it broke cross-origin
    # fetch() preflight for no real security benefit. This location block only
    # exists in case you want to add IP allow-listing later.
    location /admin {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Long cache for Nuxt build assets
    location /_nuxt/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
}

# ── Backend API ───────────────────────────────────────────
server {
    listen 80;
    server_name api.evakuators.am;

    # Image uploads go through the API
    client_max_body_size 12m;

    # Moderation endpoints — auth is a real backend JWT now (DriverJwtGuard's
    # sibling AdminJwtGuard, see backend/src/admin-auth), checked by NestJS on
    # every request. No nginx Basic Auth: it doesn't survive cross-origin
    # fetch() preflight and added no protection the app-level guard doesn't
    # already provide. This location only exists for future IP allow-listing.
    location /api/v1/admin {
        proxy_pass http://127.0.0.1:4002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:4002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
